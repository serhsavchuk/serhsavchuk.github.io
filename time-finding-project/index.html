<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/favicon.ico" type="image/x-icon">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Часопідраховувач</title>
    </head>
    <body>
        <main>
            <div class="time-ask">
                <h2>Визначення робочого часу</h2>
                    <p>Початок робочого часу:</p>
                    <div class="low-time">
                        <input type="number" min="0" max="23" id="time-hours-less" name="hours" placeholder="Години">
                        <span class="two-dots"> : </span>
                        <input type="number" min="0" max="59" id="time-minutes-less" name="minutes" placeholder="Хвилини">
                    </div>
                    
                    <p>Кінець робочого часу:</p>
                    <div class="greater-time">
                        <input type="number" min="0" max="23" id="time-hours-high" name="hours" placeholder="Години">
                        <span class="two-dots"> : </span>
                        <input type="number" min="0" max="59" id="time-minutes-high" name="minutes" placeholder="Хвилини">
                    </div>
                    <input type="button" class="button" onclick="timeDividing()" value="Розрахувати">
            </div>

            <h2>Робочий час склав:</h2>
            <div class="time-answer">
                <span id="hours-answer">00</span>
                <span class="short-timename"> год.</span>
                <span id="minutes-answer">00</span>
                <span class="short-timename"> хв.</span>
            </div>
            <input type="button" class="button" value="Оновити" onclick="location.reload()">
        </main>

        <footer>
            <p class="about-author">Розробив, зверстав та розмістив: <a href="https://github.com/serhsavchuk">Сергій Савчук</a>.</p>
        </footer>

        <div class="error" id="error-message" >
            <p>Не вірно введені дані</p>
            <input type="button" class="button" value="Оновити" onclick="location.reload()">
            <button type="button" onclick="errorCloser()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" class="close-icon"><path d="M0 0h24v24H0z" fill="none"/><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="all-screen-gray" id="error-gray-bg"></div>

    </body>
    <script src="script.js"></script>
</html>
