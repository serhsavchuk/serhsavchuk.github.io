<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="time-ask">
            <h2>Різниця часу</h2>
            <form>
                <div class="greater-time">
                    <p>Більший час:</p>
                    <input type="number" min="0" max="23" id="time-hours-high" name="hours" value="0">
                    <span> : </span>
                    <input type="number" min="0" max="59" id="time-minutes-high" name="minutes" value="0">
                </div>
                <div class="low-time">
                    <p>Менший час:</p>
                    <input type="number" min="0" max="23" id="time-hours-less" name="hours" value="0">
                    <span> : </span>
                    <input type="number" min="0" max="59" id="time-minutes-less" name="minutes" value="0">
                </div>
            </form>
            <input type="button" class="button" onclick="timeDividing()" value="Розрахувати">
        </div>
        <div class="time-answer">
            <h2>Різниця часу складає</h2>
            <span id="hours-answer">hours</span>
            <span id="minutes-answer">minutes</span>
            <input type="button" class="button" value="Оновити">
        </div>

    </body>
    <script src="script.js"></script>
</html>
