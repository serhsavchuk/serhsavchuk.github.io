<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css" type="text/css">
        <title>Computer World</title>
    </head>
    <body>
        <header id="header">
            <img src="img/logo.jpg" alt="Company Logo" id="header-img">
            <nav id="navbar">
                <ul>
                    <li><a href="#" class="nav-link">About</a></li>
                    <li><a href="#" class="nav-link">Showroom</a></li>
                    <li><a href="#" class="nav-link">Pricing</a></li>
                </ul>
            </nav>
        </header>
        <main class="content">
            <h1>A turbo one computer for you.</h1>
            <p class="title">Powerfull</p>
            <p class="description"></p>
            <p class="title">Lighter</p>
            <p class="description"></p>
            <p class="title">Splendid</p>
            <p class="description"></p>
            <video id="video" autoplay controls>
                <source src="video/video.mp4" type="video/mp4">
            </video>

            <form action="https://www.freecodecamp.com/email-submit" id="form">
                <input type="email" id="email" required name="email" placeholder="Enter email...">
                <input type="submit" value="Submit" id="submit">
            </form>
        </main>
        <footer></footer>
        <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
    </body>
</html>
